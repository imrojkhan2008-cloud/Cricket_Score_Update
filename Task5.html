<!DOCTYPE html>
<html>
<head>
<title>CSS Example</title>

<style>
body{
background-color: lightblue;
font-family: Arial;
}
#title{
color: darkblue;
text-align: center;
text-decoration: underline;
}
.text{
color: green;
text-transform: uppercase;
letter-spacing: 2px;
}
.box{
width: 250px;
padding: 20px;
border: 4px solid black;
margin: 30px;
background-color: yellow;
text-align: center;
}
button{
background-color: blue;
color: white;
padding: 10px 20px;
border: none;
}

button:hover{
background-color: red;
}


</style>

</head>

<body>

<h1 id="title">CSS Complete Example</h1>

<p class="text">This paragraph shows text properties and selectors.</p>

<div class="box">
This box demonstrates the CSS Box Model
</div>

<button>Hover Over Me</button>

</body>
</html>
